name: Update Feature Gates

on:
  workflow_dispatch:
  schedule:
    - cron: "23 */8 * * *" # Every 8 hours at :23 past the hour

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scrape wiki and update devnet/testnet activations
        run: python scripts/parse_feature_gates.py
        working-directory: ${{ github.workspace }}
        env:
          DEVNET_RPC_URL: https://api.devnet.solana.com
          TESTNET_RPC_URL: https://api.testnet.solana.com

      - name: Fetch mainnet activations
        run: python scripts/fetch_mainnet_activations.py
        working-directory: ${{ github.workspace }}
        env:
          MAINNET_RPC_URL: ${{ secrets.MAINNET_RPC_URL }}

      - name: Detect changes and estimate activation dates
        run: python scripts/detect_changes.py
        working-directory: ${{ github.workspace }}
        env:
          MAINNET_RPC_URL: ${{ secrets.MAINNET_RPC_URL }}

      - name: Send notifications
        run: python scripts/notify.py
        working-directory: ${{ github.workspace }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Commit updated feature gates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/feature_gates.json
          git diff --cached --quiet || git commit -m "Update feature gates $(date -u +%Y-%m-%d)"
          git push
